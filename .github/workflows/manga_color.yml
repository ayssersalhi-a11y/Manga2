name: MangaColoriz Official Engine
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  colorize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix and Expand Swap Space
        # استبدلنا fallocate بـ dd لتجنب خطأ Text file busy وضمان التخصيص
        run: |
          sudo swapoff -a
          sudo dd if=/dev/zero of=/swapfile bs=1M count=7168
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8' # النسخة الأكثر توافقاً مع MangaColoriz الأصلية

      - name: Install Official MangaColoriz
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy opencv-python pillow tqdm
          # تحميل المكتبة الأصلية مباشرة من المصدر
          pip install git+https://github.com/lllyasviel/ControlNet-v1-1-nightly

      - name: Run MangaColoriz Engine
        run: python main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MangaColoriz-Results
          path: colored_results/
