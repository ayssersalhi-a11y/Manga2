name: MangaColoriz Professional Engine
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  colorize_manga:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Memory Management
        # إدارة ذكية: توفير مساحة مبادلة لمنع مقتل العملية (Process Kill)
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install MangaColoriz Dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python pillow tqdm numpy
          # تثبيت المكتبة الأصلية (أو محركها الأساسي)
          pip install git+https://github.com/lllyasviel/ControlNet.git

      - name: AI Processing
        run: python main.py

      - name: Archive Results
        uses: actions/upload-artifact@v4
        with:
          name: AI-Colored-Manga
          path: colored_results/
