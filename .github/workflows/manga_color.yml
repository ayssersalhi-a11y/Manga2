name: Manga AI Colorizer
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  colorization_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # نسخة أحدث وأكثر استقراراً للذكاء الاصطناعي

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0  # هذه هي المكتبات البديلة والمستقرة

      - name: Install Manga Colorizer Core
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python numpy pillow tqdm
          # تحميل "المحرك" الحقيقي (سنستخدم نسخة خفيفة ومطورة للتلوين التلقائي)
          pip install git+https://github.com/TencentARC/GFPGAN.git # مثال لمكتبة معالجة قوية

      - name: Run Massive Colorizer
        run: python main.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Professional-Colored-Manga
          path: colored_results/
