name: Manga AI Colorizer
on:
  workflow_dispatch: # يجعله يعمل فقط عندما تضغط على زر Run يدوياً

jobs:
	colorization_job:
		runs-on: ubuntu-latest # استخدام سيرفرات لينكس القوية
		
		steps:
			- name: Checkout Code
				uses: actions/checkout@v3

			- name: Set up Python
				uses: actions/setup-python@v4
				with:
					python-version: '3.9'

			- name: Install AI Libraries
				run: |
					python -m pip install --upgrade pip
					pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
					pip install opencv-python numpy
					# هنا سنضيف لاحقاً أمر تثبيت مكتبة المانجا المحددة

			- name: Run Colorizer
				run: |
					# هذا الأمر سيشغل السكربت الذي سنكتبه معاً لاحقاً
					python main.py 
