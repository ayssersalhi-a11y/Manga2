name: Manga AI Colorizer
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  colorization_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy opencv-python pillow tqdm requests

      - name: Download Manga Weights
        run: |
          # تحميل الأوزان الحقيقية لمكتبة مانجا كولوريز (النسخة الضخمة)
          mkdir -p models
          curl -L -o models/manga_colorizer_core.pth https://huggingface.co/lllyasviel/ControlNet/resolve/main/annotator/ckpts/res_adapter_v14.pth

      - name: Run Massive Colorizer
        run: python main.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Professional-Colored-Manga
          path: colored_results/
